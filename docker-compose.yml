services:
  neo4j:
    image: neo4j:5-community
    container_name: a13-neo4j
    ports:
      - "7474:7474"   # Web 浏览器
      - "7687:7687"   # Bolt 协议
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-neo4jpassword}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  backend:
    build:
      context: ./后端
      dockerfile: Dockerfile
    container_name: a13-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4jpassword}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./后端/data:/app/data
      - ./后端/uploads:/app/uploads
    depends_on:
      - neo4j
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: 前端/vue-A13/Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: a13-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
